<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSS CLUB - Showcase Portal</title>
    <style>
        :root {
            --primary: #00d2ff;
            --bg: #0f172a;
            --text: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.05);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }
        h1 { color: var(--primary); margin-bottom: 40px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }
        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, border-color 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            background: rgba(0, 210, 255, 0.05);
        }
        .card h3 { margin: 0 0 10px 0; color: var(--primary); }
        .card p { margin: 0; font-size: 0.9rem; opacity: 0.7; }
        .footer { margin-top: 100px; opacity: 0.3; font-size: 0.8rem; }
    </style>
</head>
<body>

    <h1>🚀 DSS CLUB - Презентации</h1>

    <div class="grid">
        <!-- Dashboard Card -->
        <a href="App_Update_Showcase.html" class="card">
            <h3>App Auto Update System</h3>
            <p>Mô phỏng cơ chế Cập nhật bắt buộc & Chế độ bảo trì hệ thống.</p>
        </a>

        <!-- Placeholder cho tinh nang tiep theo -->
        <div class="card" style="opacity: 0.5; cursor: not-allowed;">
            <h3>Dự án tiếp theo...</h3>
            <p>Đang chuẩn bị nội dung trình diễn.</p>
        </div>
    </div>

    <div class="footer">
        Powered by Antigravity AI - duocbaba.github.io
    </div>

</body>
</html>
