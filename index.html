<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSS CLUB - Portal</title>
    <!-- Master Design System -->
    <link rel="stylesheet" href="css/brand_tokens.css">
    <link rel="stylesheet" href="css/master_layout.css">
    <style>
        /* Extra-clean overrides */
        body {
            background-color: var(--white); /* Pure white as requested */
        }
        .dss-header {
            background: white;
            border-bottom: 1px solid var(--border-subtle);
        }
    </style>
</head>
<body>

    <header class="dss-header">
        <a href="#" class="dss-logo">
            <div class="dss-logo-icon">D</div>
            <span class="dss-logo-text">DSS CLUB</span>
        </a>
    </header>

    <main class="dss-container dss-section">
        <section class="dss-hero">
            <h1 class="reveal-up">New Portal</h1>
            <p class="reveal-up delay-1">Hệ thống đã chuẩn hóa. Sẵn sàng để xây dựng các kịch bản trình diễn mới.</p>
        </section>

        <!-- Placeholder for new items -->
        <div class="dss-grid" id="main-grid" style="min-height: 200px; border: 2px dashed var(--border-subtle); border-radius: var(--radius-card); display: flex; align-items: center; justify-content: center; color: var(--muted-blue);">
            <p>Chưa có mục trình bày nào được thêm vào</p>
        </div>
    </main>

    <footer style="padding: var(--space-xxl) 0; text-align: center;">
        <p style="opacity: 0.2; font-size: 0.8rem; font-weight: 700;">DSS CLUB • BLANK SLATE</p>
    </footer>

</body>
</html>
